<!DOCTYPE html>

<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>工业相机远程控制</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: system-ui, sans-serif; background: #121212; color: #e8e8e8; padding: 10px; font-size: 14px; }

    h1 { text-align: center; font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }

    .preview {

      position: relative; background: #000; border-radius: 6px; overflow: hidden;

      aspect-ratio: 4/3; margin-bottom: 10px;

    }

    .preview .hint {

      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;

      color: #666; font-size: 13px; pointer-events: none;

    }

    .preview img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .preview img.no-image { display: none; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }

    .cell { background: #222; padding: 8px; border-radius: 4px; }

    .cell span { font-weight: 600; }

    .ok { color: #5cb85c; } .warn { color: #f0ad4e; } .err { color: #d9534f; }

    .metric-warn { color: #f0ad4e; }

    .sec { font-size: 12px; color: #888; margin: 8px 0 4px; }

    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }

    button { padding: 12px 8px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; color: #fff; transition: transform 0.08s, filter 0.08s; }

    button:active:not(:disabled) { transform: scale(0.97); filter: brightness(0.88); }

    button:disabled { opacity: 0.35; }

    .b-primary { background: #0067b8; }

    .b-danger { background: #a4262c; }

    .b-wide { grid-column: span 2; }

    button.btn-flash { filter: brightness(1.25); transform: scale(0.96); }

    #feedback { min-height: 18px; font-size: 12px; color: #aaa; margin-top: 6px; }

  </style>

</head>

<body>

  <h1>工业相机远程控制</h1>

  <div class="preview" id="previewBox">

    <span class="hint" id="previewHint">无画面</span>

    <img id="previewImg" class="no-image" alt="">

  </div>

  <div class="grid">

    <div class="cell">链路：<span id="linkStatus" class="warn">—</span></div>

    <div class="cell">相机：<span id="camStatus" class="warn">—</span></div>

    <div class="cell">状态：<span id="calcStatus">—</span></div>

  </div>

  <div class="sec">相机</div>

  <div class="btns">

    <button class="b-primary" id="btnOpen">打开相机</button>

    <button class="b-danger" id="btnClose">关闭相机</button>

  </div>

  <div class="sec">图像预览</div>

  <div class="btns">

    <button class="b-primary" id="btnPreviewOn">开启预览</button>

    <button class="b-danger" id="btnPreviewOff">关闭预览</button>

  </div>

  <div class="sec">计算</div>

  <div class="btns">

    <button class="b-primary" id="btnCalcStart">开始计算</button>

    <button class="b-danger" id="btnCalcStop">停止计算</button>

  </div>

  <div class="sec">标定</div>

  <div class="btns">

    <button class="b-primary b-wide" id="btnCalibrate">标定</button>

  </div>

  <div id="feedback"></div>

  <script>

  (function () {

    var token = new URLSearchParams(location.search).get('token') || '';

    if (!token) {

      document.body.innerHTML = '<p style="text-align:center;padding:24px;">认证 token 缺失，须重新获取访问链接</p>';

      return;

    }



    var previewPollMs = 120;

    var statusPollMs = 800;

    var previewBusy = false;

    var previewPolling = false;

    var previewWatchdog = null;

    var statusTimer = null;

    var cmdLocked = false;

    var hostOnline = false;

    var statusFailStreak = 0;

    var fetchTimeoutMs = 5000;

    var lastHostProbeMs = 0;



    function fetchWithTimeout(url, options) {

      options = options || {};

      if (typeof AbortController === 'undefined')

        return fetch(url, options);

      var controller = new AbortController();

      var timer = setTimeout(function () { controller.abort(); }, fetchTimeoutMs);

      var opts = Object.assign({}, options, { signal: controller.signal });

      return fetch(url, opts).finally(function () { clearTimeout(timer); });

    }



    function probeHostSoon() {

      var now = Date.now();

      if (now - lastHostProbeMs < 300)

        return;

      lastHostProbeMs = now;

      fetchStatus();

    }



    var els = {

      link: document.getElementById('linkStatus'),

      cam: document.getElementById('camStatus'),

      calc: document.getElementById('calcStatus'),

      fb: document.getElementById('feedback'),

      previewHint: document.getElementById('previewHint'),

      img: document.getElementById('previewImg')

    };

    var btns = {

      open: document.getElementById('btnOpen'),

      close: document.getElementById('btnClose'),

      calcStart: document.getElementById('btnCalcStart'),

      calcStop: document.getElementById('btnCalcStop'),

      calibrate: document.getElementById('btnCalibrate'),

      previewOn: document.getElementById('btnPreviewOn'),

      previewOff: document.getElementById('btnPreviewOff')

    };



    function apiUrl(path) {

      return path + '?token=' + encodeURIComponent(token);

    }



    function setText(el, text, cls) {

      el.textContent = text;

      el.className = cls || '';

    }



    function feedback(text) {

      els.fb.textContent = text || '';

    }



    function isCalcRunning(d) {

      if (d.calculateActive !== undefined) return !!d.calculateActive;

      return !!d.acquisitionActive;

    }



    function formatStateText(d) {

      if (d.stageRunning) return '阶段采集中';

      if (isCalcRunning(d)) return '计算中';

      if (isRemotePreviewOn(d)) return '远程预览中';

      if (d.cameraOpen) return '可开远程预览';

      return '待机';

    }



    function formatStateClass(d) {

      if (d.stageRunning || isCalcRunning(d) || isRemotePreviewOn(d)) return 'ok';

      if (d.cameraOpen) return 'warn';

      return '';

    }



    function isRemotePreviewOn(d) {

      if (d.remotePreviewActive !== undefined) return !!d.remotePreviewActive;

      return false;

    }



    function disableAllButtons() {

      Object.keys(btns).forEach(function (k) { btns[k].disabled = true; });

    }



    function applyOfflineState(message) {

      hostOnline = false;

      statusFailStreak += 1;

      cmdLocked = false;

      clearPreviewImage('主机已断开');

      setText(els.link, '异常', 'err');

      setText(els.cam, '—', 'warn');

      setText(els.calc, '主机已断开', 'err');

      disableAllButtons();

      feedback(message || '主机已断开，轮询重试中');

    }



    function applyBtnState(d) {

      var open = !!d.cameraOpen;

      var remotePreview = isRemotePreviewOn(d);

      var calc = isCalcRunning(d);

      btns.open.disabled = open;

      btns.close.disabled = !open;

      btns.previewOn.disabled = !open || remotePreview;

      btns.previewOff.disabled = !open || !remotePreview;

      btns.calcStart.disabled = !open || calc;

      btns.calcStop.disabled = !open || !calc;

      btns.calibrate.disabled = !open;

      if (cmdLocked)

        Object.keys(btns).forEach(function (k) { btns[k].disabled = true; });

    }



    function applyOnlineStatus(d) {

      hostOnline = true;

      statusFailStreak = 0;

      cmdLocked = !!d.remoteControlBlocked;

      setText(els.link, '正常', 'ok');

      setText(els.cam, d.cameraOpen ? '已打开' : '未打开', d.cameraOpen ? 'ok' : 'warn');

      setText(els.calc, formatStateText(d), formatStateClass(d));

      applyBtnState(d);

      feedback(cmdLocked ? (d.remoteControlMessage || '') : '');

      syncPreviewFromStatus(d);

    }



    function clearPreviewWatchdog() {

      if (previewWatchdog) {

        clearTimeout(previewWatchdog);

        previewWatchdog = null;

      }

    }



    function armPreviewWatchdog() {

      clearPreviewWatchdog();

      previewWatchdog = setTimeout(function () {

        previewBusy = false;

        schedulePreview();

      }, 4000);

    }



    function clearPreviewImage(hint) {

      previewPolling = false;

      previewBusy = false;

      clearPreviewWatchdog();

      els.img.onload = els.img.onerror = null;

      els.img.removeAttribute('src');

      els.img.classList.add('no-image');

      els.previewHint.textContent = hint || '无画面';

      els.previewHint.style.display = '';

    }



    function startPreviewPolling() {

      previewPolling = true;

      els.previewHint.style.display = 'none';

      previewBusy = false;

      schedulePreview();

    }



    function syncPreviewFromStatus(d) {

      var open = !!d.cameraOpen;

      var remotePreview = isRemotePreviewOn(d);

      if (!remotePreview) {

        if (previewPolling)

          clearPreviewImage(open ? '远程预览已关闭' : '无画面');

        else

          els.previewHint.textContent = open ? '须开启远程预览' : '无画面';

        return;

      }

      if (!open) {

        clearPreviewImage('无画面');

        return;

      }

      if (!previewPolling)

        startPreviewPolling();

    }



    function setPreviewEnabled(on) {

      if (on)

        postCmd('/api/preview/open', '开启预览');

      else

        postCmd('/api/preview/close', '关闭预览');

    }



    function applyStatus(d) {

      if (!d || d.ok === false || d.remoteEnabled === false) {

        var msg = (d && d.message) ? d.message : '';

        if (d && d.remoteEnabled === false)

          msg = msg || '远程服务已关闭';

        else if (!msg)

          msg = '主机响应异常';

        applyOfflineState(msg);

        return;

      }

      applyOnlineStatus(d);

    }



    function fetchStatus() {

      return fetchWithTimeout(apiUrl('/api/status'))

        .then(function (r) {

          return r.json().then(function (d) {

            if (!r.ok) {

              applyOfflineState((d && d.message) ? d.message : ('HTTP ' + r.status));

              throw new Error('offline');

            }

            applyStatus(d);

          });

        })

        .catch(function (err) {

          if (err && err.message === 'offline') return;

          var hint = '主机软件已结束或网络中断，轮询重试中';

          if (err && err.name === 'AbortError')

            hint = '连接超时，主机可能已关闭';

          applyOfflineState(hint);

        });

    }



    function schedulePreview() {

      if (!previewPolling || previewBusy)

        return;

      previewBusy = true;

      armPreviewWatchdog();

      var img = els.img;

      var next = function (ev) {

        clearPreviewWatchdog();

        previewBusy = false;

        if (!previewPolling)

          return;

        if (ev && ev.type === 'error')

          probeHostSoon();

        if (img.src && img.complete && img.naturalWidth > 0)

          img.classList.remove('no-image');

        setTimeout(schedulePreview, previewPollMs);

      };

      img.onload = next;

      img.onerror = next;

      img.src = apiUrl('/api/preview.jpg') + '&t=' + Date.now();

    }



    function resumeFromBackground() {

      previewBusy = false;

      clearPreviewWatchdog();

      fetchStatus();

    }



    document.addEventListener('visibilitychange', function () {

      if (document.visibilityState === 'visible')

        resumeFromBackground();

    });



    function releaseCommandLock() {

      fetch(apiUrl('/api/release'), { method: 'POST', keepalive: true }).catch(function () {});

    }



    window.addEventListener('pagehide', releaseCommandLock);



    function postCmd(path, label) {

      if (cmdLocked) {

        feedback(els.fb.textContent || '命令通道被占用');

        return;

      }

      feedback(label + '…');

      fetchWithTimeout(apiUrl(path), { method: 'POST' })

        .then(function (r) {

          return r.json().then(function (d) {

            if (r.status === 409) {

              cmdLocked = true;

              Object.keys(btns).forEach(function (k) { btns[k].disabled = true; });

              feedback(d.message || '命令通道被占用');

              throw new Error('blocked');

            }

            if (!r.ok) {

              if (r.status === 403 || r.status >= 500)

                applyOfflineState((d && d.message) ? d.message : ('HTTP ' + r.status));

              throw new Error('post');

            }

            return d;

          });

        })

        .then(function (d) {

          feedback(d.message || label);

          return fetchStatus();

        })

        .catch(function (err) {

          if (err && err.message === 'blocked') return;

          if (err && err.message !== 'post')

            applyOfflineState('主机软件已结束或网络中断，轮询重试中');

          else

            feedback(label + '失败');

        });

    }



    function loadConfig() {

      return fetch(apiUrl('/api/config'))

        .then(function (r) { return r.ok ? r.json() : {}; })

        .then(function (c) {

          if (c.previewPollMs) previewPollMs = c.previewPollMs;

          if (c.statusPollMs) statusPollMs = c.statusPollMs;

          if (c.fetchTimeoutMs) fetchTimeoutMs = c.fetchTimeoutMs;

        })

        .catch(function () { });

    }



    function flashBtn(btn) {

      if (!btn || btn.disabled) return;

      btn.classList.add('btn-flash');

      setTimeout(function () { btn.classList.remove('btn-flash'); }, 180);

    }



    btns.open.onclick = function () { postCmd('/api/camera/open', '打开相机'); };

    btns.close.onclick = function () { postCmd('/api/camera/close', '关闭相机'); };

    btns.calcStart.onclick = function () { postCmd('/api/camera/calculate/start', '开始计算'); };

    btns.calcStop.onclick = function () { postCmd('/api/camera/calculate/stop', '停止计算'); };

    btns.calibrate.onclick = function () {

      flashBtn(btns.calibrate);

      postCmd('/api/camera/calibrate', '标定');

    };

    btns.previewOn.onclick = function () { setPreviewEnabled(true); };

    btns.previewOff.onclick = function () { setPreviewEnabled(false); };



    loadConfig().then(function () {

      fetchStatus();

      statusTimer = setInterval(fetchStatus, statusPollMs);

    });

  })();

  </script>

</body>

</html>
